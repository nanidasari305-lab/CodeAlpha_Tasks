<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Aurora | Registration & Login</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo text-gradient">AURORA</a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="index.html#products">Products</a>
                    <a href="auth.html" id="auth-link">Login</a>
                </div>
                <a href="cart.html" class="cart-icon">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count">0</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <div class="glass auth-card fade-in">
                <div id="auth-header" style="text-align: center; margin-bottom: var(--spacing-md);">
                    <h2 id="auth-title">Welcome Back</h2>
                    <p id="auth-subtitle" style="color: var(--text-secondary);">Please enter your details to login.</p>
                </div>

                <form id="auth-form" class="auth-form">
                    <div id="username-field" class="form-group" style="display: none;">
                        <label>Username</label>
                        <input type="text" id="username" class="glass form-input">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="glass form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="glass form-input" required>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-primary" style="margin-top: 1rem;">Login</button>
                </form>

                <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary);">
                    <span id="toggle-text">Don't have an account?</span>
                    <button id="toggle-auth"
                        style="color: var(--accent-secondary); font-weight: 600; margin-left: 0.5rem;">Sign Up</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; justify-content: center;">
                <div>© 2026 Aurora Premium Store. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
